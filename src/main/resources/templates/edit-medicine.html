<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Edit medicine information in Pharmacy Management System.">
    <meta name="keywords" content="edit medicine, update medicine, pharmacy inventory">
    <meta name="author" content="Pharmacy Management System">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Medicine | Pharmacy Management System</title>

    <link rel="stylesheet" th:href="@{/edit-medicine.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">
        <img th:src="@{/logo.png}" alt="Pharmacy Management System Logo">
        <div>
            <h2>Pharmacy Management System</h2>
            <span>Edit Medicine</span>
        </div>
    </div>

    <ul class="nav-links">
        <li><a th:href="@{/dashboard}">Home</a></li>
        <li><a th:href="@{/add-medicine}">Add Medicine</a></li>
        <li><a th:href="@{/stock}" class="active">Stock</a></li>
        <li><a th:href="@{/sell-billing}">Sell & Billing</a></li>
        <li><a th:href="@{/sell}">Selling History</a></li>
    </ul>

    <form th:action="@{/logout}" method="post">
        <input type="hidden"
               th:if="${_csrf != null}"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">
        <button type="submit" class="logout-btn">Logout</button>
    </form>
</nav>

<main class="page-container">

    <section class="page-header">
        <div>
            <h1>Edit Medicine</h1>
            <p>Update medicine information and save changes.</p>
        </div>

        <a th:href="@{/stock}" class="add-btn">Back to Stock</a>
    </section>

    <p th:if="${successMessage}" th:text="${successMessage}" class="message success"></p>
    <p th:if="${errorMessage}" th:text="${errorMessage}" class="message error"></p>

    <section class="form-section">

        <form th:action="@{/medicines/update/{id}(id=${medicineId})}"
              th:object="${medicineRequest}"
              method="post"
              class="medicine-form">

            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div class="form-grid">

                <div class="form-group">
                    <label>Medicine Name</label>
                    <input type="text" th:field="*{medicineName}" placeholder="Enter medicine name" required>
                    <small th:if="${#fields.hasErrors('medicineName')}" th:errors="*{medicineName}"></small>
                </div>

                <div class="form-group">
                    <label>Generic Name</label>
                    <input type="text" th:field="*{genericName}" placeholder="Enter generic name" required>
                    <small th:if="${#fields.hasErrors('genericName')}" th:errors="*{genericName}"></small>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <input type="text" th:field="*{category}" placeholder="Tablet / Syrup / Capsule" required>
                    <small th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></small>
                </div>

                <div class="form-group">
                    <label>Manufacturer</label>
                    <input type="text" th:field="*{manufacturer}" placeholder="Enter company name" required>
                    <small th:if="${#fields.hasErrors('manufacturer')}" th:errors="*{manufacturer}"></small>
                </div>

                <div class="form-group">
                    <label>Batch Number</label>
                    <input type="text" th:field="*{batchNo}" placeholder="Enter batch number" required>
                    <small th:if="${#fields.hasErrors('batchNo')}" th:errors="*{batchNo}"></small>
                </div>

                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" th:field="*{quantity}" placeholder="Enter quantity" min="0" required>
                    <small th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></small>
                </div>

                <div class="form-group">
                    <label>Reorder Level</label>
                    <input type="number" th:field="*{reorderLevel}" placeholder="Low stock alert level" min="0" required>
                    <small th:if="${#fields.hasErrors('reorderLevel')}" th:errors="*{reorderLevel}"></small>
                </div>

                <div class="form-group">
                    <label>Selling Price</label>
                    <input type="number" step="0.01" th:field="*{sellingPrice}" placeholder="Enter selling price" min="0" required>
                    <small th:if="${#fields.hasErrors('sellingPrice')}" th:errors="*{sellingPrice}"></small>
                </div>

                <div class="form-group">
                    <label>Expiry Date</label>
                    <input type="date" th:field="*{expiryDate}" required>
                    <small th:if="${#fields.hasErrors('expiryDate')}" th:errors="*{expiryDate}"></small>
                </div>

                <div class="form-group">
                    <label>Supplier</label>
                    <input type="text" th:field="*{supplier}" placeholder="Enter supplier name">
                </div>

                <div class="form-group">
                    <label>Rack No</label>
                    <input type="text" th:field="*{rackNo}" placeholder="Enter rack/shelf no">
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select th:field="*{medicineStatus}" required>
                        <option value="">Select status</option>
                        <option th:each="status : ${medicineStatuses}"
                                th:value="${status}"
                                th:text="${status}">
                        </option>
                    </select>
                    <small th:if="${#fields.hasErrors('medicineStatus')}" th:errors="*{medicineStatus}"></small>
                </div>

                <div class="form-group full-width">
                    <label>Description</label>
                    <textarea th:field="*{description}" placeholder="Write medicine note"></textarea>
                </div>

            </div>

            <div class="form-actions">
                <button type="submit" class="submit-btn">Update Medicine</button>
                <a th:href="@{/stock}" class="reset-btn">Cancel</a>
            </div>

        </form>

    </section>

</main>

</body>
</html>
